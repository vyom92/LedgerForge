---
app:
  name: "LedgerForge"
  description: "Private, single-user, offline-first personal finance application."
  characteristics:
    - private
    - single-user
    - offline-first

bootstrap:
  read_order:
    - "Project documents/.github/Context_Manifest.yaml"
    - "AGENTS.md"
    - "Project documents/Project_Guide.md"
    - "Project documents/PROJECT_STATE.md"
    - "Project documents/Implementation.md#ACTIVE"
  rule: "Always read only the ACTIVE sprint in Implementation.md."
  sprint_planning_read_order:
    - "Project documents/.github/Context_Manifest.yaml"
    - "AGENTS.md"
    - "Project documents/Project_Guide.md"
    - "Project documents/PROJECT_STATE.md"
    - "Project documents/FUTURE_WORK.MD"
    - "Task-relevant architecture, ADRs, product vision, standards and fixtures"
    - "Define the next ACTIVE sprint in Project documents/Implementation.md"
  sprint_planning_rule: "Consult FUTURE_WORK.MD when selecting or reprioritising unscheduled work; do not load it for routine implementation when the ACTIVE sprint is already defined."

precedence:
  authoritative_documents:
    - "Project documents/Architecture_v1.0_Frozen.md"
    - "Project documents/ADR.md"
    - "Project documents/PROJECT_STATE.md"
    - "Project documents/Implementation.md#ACTIVE"
    - "Project documents/Engineering Standards.md"
    - "Project documents/Database_v1_Architecture.md"
    - "Project documents/Product Vision.md"
    - "Project documents/UI_UX_v1.0_Frozen.md"

active_sprint:
  file: "Project documents/Implementation.md"
  section: "ACTIVE"
  rule: "Do not modify Implementation.md during implementation."

assistants:
  chatgpt_desktop:
    owns:
      - architecture
      - planning
      - documentation_review
      - sprint_planning
      - Implementation.md
      - documentation_change_packages
      - code_change_packages
    never_owns:
      - implementation
      - repository_wide_documentation_execution
      - commits
      - pushes

  chatgpt_xcode:
    owns:
      - exact_approved_documentation_wording_execution
      - repository_document_search
    never_owns:
      - planning
      - architecture
      - Implementation.md

  work:
    owns:
      - repository_wide_investigation
      - approved_documentation_execution
      - documentation_validation
      - documentation_commits_and_pushes_when_explicitly_approved
    never_owns:
      - sprint_planning
      - architecture
      - swift_implementation
      - Implementation.md

  codex:
    owns:
      - swift_implementation
      - builds
      - testing
      - implementation_commits
      - implementation_pushes
      - Project documents/PROJECT_STATE.md
      - Project documents/Codex response.md
    never_owns:
      - planning
      - architecture
      - Implementation.md
protected:
  files:
    - "Project documents/Implementation.md"
    - "Project documents/Implementation.md#ARCHIVE"
    - "Project documents/Architecture_v1.0_Frozen.md"
    - "Project documents/UI_UX_v1.0_Frozen.md"
  rules:
    - "Append-only for ADRs; new ADRs are added without rewriting history."
    - "Preserve frozen architecture/UI unless a newer frozen version is approved."

notes:
  pipeline_rule: "Preserve ADR-016 canonical pipeline and RepositoryStoreHydrator boundary."
  backlog_rule: "FUTURE_WORK.MD contains unscheduled work only; promoted work belongs only in the ACTIVE sprint and completed work belongs in PROJECT_STATE.md."
...
